// tweaks-panel.jsx
// Reusable Tweaks shell + form-control helpers.
//
// Owns the host protocol (listens for __activate_edit_mode / __deactivate_edit_mode,
// posts __edit_mode_available / __edit_mode_set_keys / __edit_mode_dismissed) so
// individual prototypes don't re-roll it. Ships a consistent set of controls so you
// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//                        onChange={(v) => setTweak('fontSize', v)} />
//           <TweakRadio  label="Density" value={t.density}
//                        options={['compact', 'regular', 'comfy']}
//                        onChange={(v) => setTweak('density', v)} />
//           <TweakSection label="Theme" />
//           <TweakColor  label="Primary" value={t.primaryColor}
//                        onChange={(v) => setTweak('primaryColor', v)} />
//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />
//         </TweaksPanel>
//       </div>
//     );
//   }
//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);

  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}

  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}

    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}

    background-repeat:no-repeat;background-position:right 8px center}

    border-radius:999px;background:rgba(0,0,0,.12);outline:none}

    width:14px;height:14px;border-radius:50%;background:#fff;

    background:#fff;border:.5px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:default}

    background:rgba(0,0,0,.06);user-select:none}

    background:rgba(0,0,0,.78);color:#fff;font:inherit;font-weight:500;cursor:default}

  .twk-btn.secondary:hover{background:rgba(0,0,0,.1)}

  .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;
    border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;
    background:transparent;flex-shrink:0}
  .twk-swatch::-webkit-color-swatch-wrapper{padding:0}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel">
// Blexa — brand marks + custom line icons.
// All icons are 24×24 viewBox, stroke-only, 1.5px. No emoji.

const Logo = ({ size = 22, variant = 'mark' }) => {
  // variant: mark | wordmark | dot
  if (variant === 'dot') {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-label="blexa">
        <circle cx="12" cy="12" r="10" fill="currentColor" />
        <circle cx="12" cy="12" r="3" fill="var(--bg)" />
      </svg>
    );
  }
  if (variant === 'monogram') {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-label="blexa">
        <rect x="2" y="2" width="20" height="20" rx="5" fill="currentColor" />
        <path d="M8 7v10M8 7h5a3 3 0 0 1 0 6H8M8 13h6a3 3 0 0 1 0 6H8" stroke="var(--bg)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
    );
  }
  // default mark — a stylized aperture / scanner
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-label="blexa">
      <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="1.6" />
      <path d="M12 2v6M12 16v6M2 12h6M16 12h6M5 5l4.2 4.2M14.8 14.8L19 19M19 5l-4.2 4.2M9.2 14.8L5 19" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" />
      <circle cx="12" cy="12" r="2.4" fill="currentColor" />
    </svg>
  );
};

const Wordmark = ({ logoVariant = 'mark', size = 22 }) => (
  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, color: 'var(--fg)' }}>
    <Logo variant={logoVariant} size={size} />
    <span style={{
      fontFamily: 'var(--font-sans)',
      fontWeight: 500,
      fontSize: size * 0.82,
      letterSpacing: '-0.03em',
      color: 'var(--fg)',
    }}>blexa</span>
  </span>
);

// ─── Custom line icons (24×24, stroke 1.5) ───────────────────────────────

const Icon = {
  arrow: (p) => <svg viewBox="0 0 24 24" fill="none" {...p}><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  check: (p) => <svg viewBox="0 0 24 24" fill="none" {...p}><path d="M5 12.5l4.5 4.5L19 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,

  <script type="text/babel">
// Hero section with live scanning demo + 5 layout variants

const ITALIAN_CITIES = ['Milano', 'Roma', 'Napoli', 'Torino', 'Bologna', 'Firenze', 'Venezia', 'Genova', 'Verona', 'Bari'];

const REGIONI_ITALIA = {
  'Milano': 'Lombardia', 'Roma': 'Lazio', 'Napoli': 'Campania', 'Torino': 'Piemonte',
  'Bologna': 'Emilia-Romagna', 'Firenze': 'Toscana', 'Venezia': 'Veneto',
  'Genova': 'Liguria', 'Verona': 'Veneto', 'Bari': 'Puglia'
};

const NOMI_CATEGORIE = {
  'Ristoranti': ['La Bussola', 'Il Gabbiano', 'Da Mario', 'Trattoria Antica', 'Osteria del Borgo', 'La Brace'],
  'Hotel': ['Villa Aurora', 'Hotel Excelsior', 'Grand Hotel', 'Albergo Roma', 'Hotel Centrale', 'Relais Paradiso'],
  'Studi Legali': ['Studio Legale', 'Avvocati Associati', 'Studio Rossi', 'Lex Consulting', 'Studio Legale Bianchi'],
  'Estetica': ['Centro Estetico', 'Benessere Totale', 'La Perla', 'Estetica Moderna', 'Beauty Center']
};

function generateLeadsForCity(city) {
  const region = REGIONI_ITALIA[city] || 'Italia';
  const categories = Object.keys(NOMI_CATEGORIE);
  const leads = [];
  for (let i = 0; i < 4; i++) {
    const cat = categories[Math.floor(Math.random() * categories.length)];
    const names = NOMI_CATEGORIE[cat];
    const name = names[Math.floor(Math.random() * names.length)] + (Math.random() > 0.5 ? ' ' + city : '');
    const score = Math.floor(Math.random() * 100);
    leads.push({ name: name + ' ' + Math.floor(Math.random()*100), cat, city, region, score });
  }
  return leads;
}

const scoreClass = (s) => s < 40 ? 'low' : s < 70 ? 'mid' : 'high';
const scoreLabel = (s) => s < 40 ? 'Alta' : s < 70 ? 'Media' : 'Bassa';

// ─── Live scanning demo ───────────────────────────────────────────────────
function ScanningDemo({ compact = false }) {
  const [phase, setPhase] = React.useState('typing'); // typing → scanning → results
  const [typed, setTyped] = React.useState('');
  const [foundLeads, setFoundLeads] = React.useState([]);
  const [cityIdx, setCityIdx] = React.useState(0);
  const target = ITALIAN_CITIES[cityIdx];
  const [currentLeads, setCurrentLeads] = React.useState([]);

  React.useEffect(() => {
    if (phase !== 'typing') return;
    if (typed === '') {
      setCurrentLeads(generateLeadsForCity(target));
    }
    if (typed.length < target.length) {
      const t = setTimeout(() => setTyped(target.slice(0, typed.length + 1)), 90);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setPhase('scanning'), 600);
    return () => clearTimeout(t);
  }, [typed, phase, target]);

  React.useEffect(() => {
    if (phase !== 'scanning') return;
    setFoundLeads([]);
    let i = 0;
    const id = setInterval(() => {
      i++;
      setFoundLeads(currentLeads.slice(0, i));
      if (i >= 4) {
        clearInterval(id);
        setTimeout(() => setPhase('results'), 600);
      }
    }, 280);
    return () => clearInterval(id);
  }, [phase]);

  React.useEffect(() => {
    if (phase !== 'results') return;
    const t = setTimeout(() => {
      setTyped('');
      setFoundLeads([]);
      setCityIdx((i) => (i + 1) % ITALIAN_CITIES.length);
      setPhase('typing');
    }, 4200);
    return () => clearTimeout(t);
  }, [phase]);

  const sources = ['Pagine Gialle', 'OpenStreetMap', 'TripAdvisor', 'TheFork', 'Pagine Bianche', 'Infobel', 'Yelp', 'Google'];

  return (
    <div className="scanner">
      <div className="scanner-chrome">
        <div className="scanner-dots"><span/><span/><span/></div>
        <div className="scanner-title mono">blexa · scanner</div>
        <div className={`scanner-status ${phase}`}>
          <span className="dot"/>{phase === 'typing' ? 'idle' : phase === 'scanning' ? 'scanning' : 'completed'}
        </div>
      </div>
      <div className="scanner-bar">
        <Icon.search width="14" height="14" style={{ color: 'var(--muted)', flexShrink: 0 }} />
        <span className="mono scanner-input">
          {typed}<span className={`caret ${phase === 'typing' ? 'on' : ''}`}>|</span>
        </span>
        <span className="scanner-cat mono">categoria: <b>ristoranti</b></span>
      </div>
      <div className="scanner-sources">
        {sources.map((s, i) => (
          <span key={s} className={`src mono ${phase !== 'typing' && i < (phase === 'scanning' ? foundLeads.length + 2 : 8) ? 'on' : ''}`}>
            <span className="src-tick"/>{s}
          </span>
        ))}
      </div>
      <div className="scanner-results">
        {currentLeads.slice(0, 4).map((lead, i) => {
          const visible = foundLeads.length > i || phase === 'results';
          return (
            <div key={lead.name} className={`lead-row ${visible ? 'in' : ''}`} style={{ transitionDelay: `${i * 60}ms` }}>
              <div className="lead-meta">
                <div className="lead-name">{lead.name}</div>
                <div className="lead-loc mono">
                  <Icon.pin width="11" height="11" />
                  {lead.city}, {lead.region}
                </div>
              </div>
              <div className="lead-cat mono">{lead.cat}</div>
              <div className={`score-chip ${scoreClass(lead.score)}`}>
                <span className="mono" style={{fontSize: 10, opacity: 0.7}}>SCORE</span>
                <b>{lead.score}</b>
              </div>
            </div>
          );
        })}
      </div>
      <div className="scanner-foot">
        <div className="foot-stat">
          <span className="mono small">Opportunità totali / mese</span>
          <b className="mono">€ 4.380</b>
        </div>
        <div className="foot-pace">
          <ScannerPulse active={phase === 'scanning'} />
        </div>
      </div>
    </div>
  );
}

  return (

// ─── Countdown ────────────────────────────────────────────────────────────
function Countdown({ launchOffset = 14 }) {
  const target = React.useMemo(() => {
    const t = new Date();
    t.setDate(t.getDate() + launchOffset);
    t.setHours(10, 0, 0, 0);
    return t.getTime();
  }, [launchOffset]);
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const diff = Math.max(0, target - now);
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const fmt = (n) => String(n).padStart(2, '0');
  return (
    <div className="countdown mono">
      <span className="cd-cell"><b>{fmt(d)}</b><i>g</i></span>
      <span className="cd-sep">:</span>
      <span className="cd-cell"><b>{fmt(h)}</b><i>h</i></span>
      <span className="cd-sep">:</span>
      <span className="cd-cell"><b>{fmt(m)}</b><i>m</i></span>
      <span className="cd-sep">:</span>
      <span className="cd-cell"><b>{fmt(s)}</b><i>s</i></span>
    </div>
  );
}

// ─── Email signup with validation ─────────────────────────────────────────
function SignupForm({ size = 'md' }) {
  const [email, setEmail] = React.useState('');
  const [state, setState] = React.useState('idle'); // idle | error | success | duplicate | loading
  const [touched, setTouched] = React.useState(false);
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const submit = (e) => {
    e.preventDefault();
    setTouched(true);
    if (!valid) { setState('error'); return; }
    setState('loading');
    if (window.handleWaitlistReact) {
      window.handleWaitlistReact(email, (resState) => {
        setState(resState);
        setTimeout(() => setState('idle'), 4000);
      });
    } else {
      setState('success');
      setTimeout(() => setState('idle'), 4000);
    }
  };
  return (
    <form className={`signup-form ${state} ${size}`} onSubmit={submit} noValidate>
      <input
        type="email"
        placeholder="la-tua-email@esempio.it"
        value={email}
        onChange={(e) => { setEmail(e.target.value); setState('idle'); }}
        onBlur={() => setTouched(true)}
      />
      <button type="submit" className={`btn ${state === 'success' || state === 'duplicate' ? 'btn-accent' : 'btn-primary'}`} disabled={state === 'loading'}>
        {state === 'success' ? <>In lista <Icon.check width="16" height="16"/></> : state === 'duplicate' ? <>Già iscritto!</> : state === 'loading' ? <>...</> : <>Prenota posto <Icon.arrow width="16" height="16"/></>}
      </button>
    </form>
  );
}

// ─── Digital Score (animated on scroll) ───────────────────────────────────
function ScoreSection() {
  const ref = React.useRef(null);
  const [progress, setProgress] = React.useState(0); // 0..1
  const [interactive, setInteractive] = React.useState(false);
  const [scores, setScores] = React.useState({ seo: 12, mobile: 28, design: 18, content: 8 });

  React.useEffect(() => {
    const onScroll = () => {
      if (!ref.current || interactive) return;
      const r = ref.current.getBoundingClientRect();
      const winH = window.innerHeight;
      const total = r.height + winH * 0.5;
      const t = Math.max(0, Math.min(1, (winH - r.top) / total));
      setProgress(t);
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, [interactive]);

  const targets = { seo: 12, mobile: 28, design: 18, content: 8 };
  const animated = interactive ? scores : {
    seo: Math.round(targets.seo * progress),
    mobile: Math.round(targets.mobile * progress),
    design: Math.round(targets.design * progress),
    content: Math.round(targets.content * progress),
  };
  const total = Math.round((animated.seo + animated.mobile + animated.design + animated.content) / 4);

  const opportunity = total < 40 ? { label: 'Opportunità Alta', tone: 'low' }
    : total < 70 ? { label: 'Opportunità Media', tone: 'mid' }
    : { label: 'Già digitalizzato', tone: 'high' };

  return (
    <section className="section section-score" id="score" ref={ref}>
      <div className="container">
        <div className="section-head">
          <div>
            <div className="eyebrow">Come funziona</div>
            <h2 className="section-title">
              Il <span className="serif">Digital Score</span><br/>
              che fa la differenza
            </h2>
          </div>
          <p className="lead">
            Non tutti i lead valgono uguale. Il Digital Score misura la debolezza digitale di ogni attività su 4 dimensioni: più è basso, più è pronta ad acquistare il tuo servizio.
          </p>
        </div>

        <div className="score-grid">
          <div className="score-visual">
            <div className="score-card">
              <ScoreRing value={total} tone={opportunity.tone} />
              <div className="score-meta">
                <div className="mono small">DIGITAL SCORE</div>
                <div className={`score-opp tone-${opportunity.tone}`}>
                  <span className="dot"/>{opportunity.label}
                </div>
              </div>
            </div>
            <div className="score-bars">
              {[
                ['SEO', animated.seo, 100, 'seo'],
                ['Mobile', animated.mobile, 100, 'mobile'],
                ['Design', animated.design, 100, 'design'],
                ['Content', animated.content, 100, 'content'],
              ].map(([label, val, max, key]) => (
                <div key={label} className="score-bar-row">
                  <div className="score-bar-label">
                    <span>{label}</span>
                    <span className="mono">{val}</span>
                  </div>
                  <div className="score-bar">
                    <div className="score-bar-fill" style={{ width: `${val}%` }} />
                  </div>
                  {interactive && (
                    <input type="range" min="0" max="100" value={val} className="score-range"
                           onChange={(e) => setScores({ ...scores, [key]: Number(e.target.value) })}/>
                  )}
                </div>
              ))}
              <button className="score-toggle" onClick={() => setInteractive(!interactive)}>
                {interactive ? 'Reset animazione' : 'Prova tu →'}
              </button>
            </div>
          </div>

          <div className="score-legend">
            <h3 style={{ fontWeight: 500, fontSize: 14, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 24 }}>
              Come leggere il score
            </h3>
            <div className="legend-row">
              <div className="legend-range mono"><span className="dot tone-low"/>0–39</div>
              <div className="legend-text">
                <b>Opportunità Alta</b>
                <p>Presenza digitale quasi assente. Massima probabilità di conversione. Cliente ideale per siti web, SEO, social.</p>
              </div>
            </div>
            <div className="legend-row">
              <div className="legend-range mono"><span className="dot tone-mid"/>40–69</div>
              <div className="legend-text">
                <b>Opportunità Media</b>
                <p>Sito presente ma migliorabile. Ottimo per restyling, SEO o campagne adv.</p>
              </div>
            </div>
            <div className="legend-row">
              <div className="legend-range mono"><span className="dot tone-high"/>70–100</div>
              <div className="legend-text">
                <b>Già digitalizzato</b>
                <p>Sito ottimizzato. Puoi escluderlo o proporre servizi avanzati (ads, automazioni, CRM).</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function ScoreRing({ value, tone }) {
  const r = 76;
  const C = 2 * Math.PI * r;
  const frac = value / 100;
  const color = tone === 'low' ? 'var(--accent)' : tone === 'mid' ? '#b45309' : '#15803d';
  return (
    <svg width="200" height="200" viewBox="0 0 200 200" className="score-ring">
      <circle cx="100" cy="100" r={r} stroke="var(--line)" strokeWidth="2" fill="none"/>
      <circle cx="100" cy="100" r={r} stroke={color} strokeWidth="6" fill="none"
              strokeLinecap="round"
              strokeDasharray={`${C * frac} ${C}`}
              transform="rotate(-90 100 100)"
              style={{ transition: 'stroke-dasharray 600ms cubic-bezier(.2,.6,.2,1)' }}/>
      <text x="100" y="104" fontFamily="var(--font-mono)" fontSize="56" fill="var(--fg)" textAnchor="middle" fontWeight="500" letterSpacing="-2">{value}</text>
      <text x="100" y="128" fontFamily="var(--font-mono)" fontSize="10" fill="var(--muted)" textAnchor="middle" letterSpacing="2">/ 100</text>
    </svg>
  );
}

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "centered",
      "theme": "light",
      "accent": "#dc2626",
      "pricingStyle": "cards",
      "density": "regular",
      "typography": "geist",
      "logoVariant": "mark"
    }/*EDITMODE-END*/;

    const TYPOGRAPHY_PAIRS = {
      geist: { sans: "'Geist', ui-sans-serif, system-ui, sans-serif", mono: "'Geist Mono', ui-monospace, monospace", serif: "'Instrument Serif', serif" },
      inter: { sans: "'Inter', ui-sans-serif, system-ui, sans-serif", mono: "'JetBrains Mono', ui-monospace, monospace", serif: "'Instrument Serif', serif" },
      editorial: { sans: "'Geist', ui-sans-serif, system-ui, sans-serif", mono: "'Geist Mono', ui-monospace, monospace", serif: "'Fraunces', serif" },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply theme + density + typography to <html>
      React.useEffect(() => {
        document.documentElement.dataset.theme = t.theme;
        document.documentElement.dataset.density = t.density;
        const pair = TYPOGRAPHY_PAIRS[t.typography] || TYPOGRAPHY_PAIRS.geist;
        document.documentElement.style.setProperty('--font-sans', pair.sans);
        document.documentElement.style.setProperty('--font-mono', pair.mono);
        document.documentElement.style.setProperty('--font-serif', pair.serif);
        document.documentElement.style.setProperty('--accent', t.accent);
        // derive accent tint
        const m = t.accent.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
        if (m) {
          const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
          document.documentElement.style.setProperty('--accent-tint', `rgba(${r},${g},${b},0.08)`);
        }
      }, [t.theme, t.density, t.typography, t.accent]);

      const Hero = HERO_VARIANTS[t.heroVariant] || HeroV1_Split;

      return (
        <div className="page">
          {/* Top banner */}
          <div className="banner">
            <span className="banner-dot"/>
            Solo 127 posti in beta gratuita
            <span style={{opacity:0.6}}>·</span>
            Lancio fra <Countdown launchOffset={9}/>
            <span style={{opacity:0.6}}>·</span>
            <a href="#prezzi">Prenota il tuo posto →</a>
          </div>

            <div className="container nav-inner">
              <Wordmark logoVariant={t.logoVariant} size={22} />
              <nav className="nav-links">
                <a href="#problema">Problema</a>
                <a href="#come">Come funziona</a>
                <a href="#funzionalita">Funzionalità</a>
                <a href="#score">Digital Score</a>
                <a href="#prezzi">Prezzi</a>
                <a href="#faq">FAQ</a>
              </nav>
              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                <a className="btn btn-sm btn-ghost" href="#">Accedi</a>
                <a className="btn btn-sm btn-primary" href="#prezzi">Beta →</a>
              </div>
            </div>
          </header>

          <main>
            <div data-screen-label="01 Hero"><Hero /></div>
            <div data-screen-label="02 Problem"><ProblemSection /></div>
            <div data-screen-label="03 Solution"><SolutionSection /></div>
            <div data-screen-label="04 Features"><FeaturesSection /></div>
            <div data-screen-label="05 Score"><ScoreSection /></div>
            <div data-screen-label="06 Pricing"><PricingSection style={t.pricingStyle} /></div>
            <div data-screen-label="07 Testimonials"><TestimonialsSection /></div>
            <div data-screen-label="08 FAQ"><FAQSection /></div>
            <div data-screen-label="09 Final CTA"><FinalCTASection /></div>
          </main>

          <Footer logoVariant={t.logoVariant} />

          <TweaksPanel title="Tweaks · Blexa">
            <TweakSection label="Layout" />
            <TweakSelect label="Hero variant" value={t.heroVariant}
              options={[
                { value: 'split', label: 'Split (default)' },
                { value: 'centered', label: 'Centered + countdown' },
                { value: 'editorial', label: 'Editorial big-type' },
                { value: 'terminal', label: 'Terminal / dev tool' },
                { value: 'bigtype', label: 'Big type / poster' },
              ]}
              onChange={(v) => setTweak('heroVariant', v)} />
            <TweakRadio label="Density" value={t.density}
              options={['compact', 'regular', 'comfortable']}
              onChange={(v) => setTweak('density', v)} />
            <TweakRadio label="Pricing" value={t.pricingStyle}
              options={[{value:'cards', label:'cards'}, {value:'flat', label:'flat'}]}
              onChange={(v) => setTweak('pricingStyle', v)} />

            <TweakSection label="Brand" />
            <TweakRadio label="Theme" value={t.theme}
              options={['light', 'cream', 'dark']}
              onChange={(v) => setTweak('theme', v)} />
            <TweakColor label="Accent" value={t.accent}
              onChange={(v) => setTweak('accent', v)} />
            <TweakSelect label="Logo" value={t.logoVariant}
              options={[
                { value: 'mark', label: 'Aperture (default)' },
                { value: 'monogram', label: 'Monogram B' },
                { value: 'dot', label: 'Minimal dot' },
              ]}
              onChange={(v) => setTweak('logoVariant', v)} />
            <TweakSelect label="Typography" value={t.typography}
              options={[
                { value: 'geist', label: 'Geist + Instrument' },
                { value: 'inter', label: 'Inter + JetBrains' },
                { value: 'editorial', label: 'Geist + Fraunces' },
              ]}
              onChange={(v) => setTweak('typography', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
