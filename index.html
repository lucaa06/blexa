<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blexa — Lead generation per agenzie italiane</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="hero.css" />
  <link rel="stylesheet" href="sections.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="brand.jsx"></script>
  <script type="text/babel" src="hero.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "heroVariant": "centered",
      "theme": "light",
      "accent": "#dc2626",
      "pricingStyle": "cards",
      "density": "regular",
      "typography": "geist",
      "logoVariant": "mark"
    }/*EDITMODE-END*/;

    const TYPOGRAPHY_PAIRS = {
      geist: { sans: "'Geist', ui-sans-serif, system-ui, sans-serif", mono: "'Geist Mono', ui-monospace, monospace", serif: "'Instrument Serif', serif" },
      inter: { sans: "'Inter', ui-sans-serif, system-ui, sans-serif", mono: "'JetBrains Mono', ui-monospace, monospace", serif: "'Instrument Serif', serif" },
      editorial: { sans: "'Geist', ui-sans-serif, system-ui, sans-serif", mono: "'Geist Mono', ui-monospace, monospace", serif: "'Fraunces', serif" },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply theme + density + typography to <html>
      React.useEffect(() => {
        document.documentElement.dataset.theme = t.theme;
        document.documentElement.dataset.density = t.density;
        const pair = TYPOGRAPHY_PAIRS[t.typography] || TYPOGRAPHY_PAIRS.geist;
        document.documentElement.style.setProperty('--font-sans', pair.sans);
        document.documentElement.style.setProperty('--font-mono', pair.mono);
        document.documentElement.style.setProperty('--font-serif', pair.serif);
        document.documentElement.style.setProperty('--accent', t.accent);
        // derive accent tint
        const m = t.accent.match(/^#([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
        if (m) {
          const r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
          document.documentElement.style.setProperty('--accent-tint', `rgba(${r},${g},${b},0.08)`);
        }
      }, [t.theme, t.density, t.typography, t.accent]);

      const Hero = HERO_VARIANTS[t.heroVariant] || HeroV1_Split;

      return (
        <div className="page">
          {/* Top banner */}
          <div className="banner">
            <span className="banner-dot"/>
            Solo 127 posti in beta gratuita
            <span style={{opacity:0.6}}>·</span>
            Lancio fra <Countdown launchOffset={9}/>
            <span style={{opacity:0.6}}>·</span>
            <a href="#prezzi">Prenota il tuo posto →</a>
          </div>

          {/* Nav */}
          <header className="nav" data-screen-label="Nav">
            <div className="container nav-inner">
              <Wordmark logoVariant={t.logoVariant} size={22} />
              <nav className="nav-links">
                <a href="#problema">Problema</a>
                <a href="#come">Come funziona</a>
                <a href="#funzionalita">Funzionalità</a>
                <a href="#score">Digital Score</a>
                <a href="#prezzi">Prezzi</a>
                <a href="#faq">FAQ</a>
              </nav>
              <div style={{display:'flex', gap:8, alignItems:'center'}}>
                <a className="btn btn-sm btn-ghost" href="#">Accedi</a>
                <a className="btn btn-sm btn-primary" href="#prezzi">Beta →</a>
              </div>
            </div>
          </header>

          <main>
            <div data-screen-label="01 Hero"><Hero /></div>
            <div data-screen-label="02 Problem"><ProblemSection /></div>
            <div data-screen-label="03 Solution"><SolutionSection /></div>
            <div data-screen-label="04 Features"><FeaturesSection /></div>
            <div data-screen-label="05 Score"><ScoreSection /></div>
            <div data-screen-label="06 Pricing"><PricingSection style={t.pricingStyle} /></div>
            <div data-screen-label="07 Testimonials"><TestimonialsSection /></div>
            <div data-screen-label="08 FAQ"><FAQSection /></div>
            <div data-screen-label="09 Final CTA"><FinalCTASection /></div>
          </main>

          <Footer logoVariant={t.logoVariant} />

          <TweaksPanel title="Tweaks · Blexa">
            <TweakSection label="Layout" />
            <TweakSelect label="Hero variant" value={t.heroVariant}
              options={[
                { value: 'split', label: 'Split (default)' },
                { value: 'centered', label: 'Centered + countdown' },
                { value: 'editorial', label: 'Editorial big-type' },
                { value: 'terminal', label: 'Terminal / dev tool' },
                { value: 'bigtype', label: 'Big type / poster' },
              ]}
              onChange={(v) => setTweak('heroVariant', v)} />
            <TweakRadio label="Density" value={t.density}
              options={['compact', 'regular', 'comfortable']}
              onChange={(v) => setTweak('density', v)} />
            <TweakRadio label="Pricing" value={t.pricingStyle}
              options={[{value:'cards', label:'cards'}, {value:'flat', label:'flat'}]}
              onChange={(v) => setTweak('pricingStyle', v)} />

            <TweakSection label="Brand" />
            <TweakRadio label="Theme" value={t.theme}
              options={['light', 'cream', 'dark']}
              onChange={(v) => setTweak('theme', v)} />
            <TweakColor label="Accent" value={t.accent}
              onChange={(v) => setTweak('accent', v)} />
            <TweakSelect label="Logo" value={t.logoVariant}
              options={[
                { value: 'mark', label: 'Aperture (default)' },
                { value: 'monogram', label: 'Monogram B' },
                { value: 'dot', label: 'Minimal dot' },
              ]}
              onChange={(v) => setTweak('logoVariant', v)} />
            <TweakSelect label="Typography" value={t.typography}
              options={[
                { value: 'geist', label: 'Geist + Instrument' },
                { value: 'inter', label: 'Inter + JetBrains' },
                { value: 'editorial', label: 'Geist + Fraunces' },
              ]}
              onChange={(v) => setTweak('typography', v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="gdpr.js"></script>
  <script src="main.js"></script>
</body>
</html>
